name: e2e-db-backup-restore-test

on:
  workflow_call:
    inputs:
      tag:
        description: Image tag to test.
        type: string
        required: true
      should-run:
        description: true if should really run the job. false - otherwise, i.e. the job should be skipped.
        type: boolean
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to test.
        type: string
        required: true

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    shell: bash

jobs:
  gke-db-backup-restore-test:
    if: github.event_name == 'workflow_dispatch' || inputs.should-run
    runs-on: ubuntu-latest
    env:
      MAIN_IMAGE_TAG: ${{ inputs.tag }}
      BUILD_TAG: ${{ inputs.tag }}
      CI_JOB_NAME: gke-db-backup-restore-test
      ARTIFACT_DIR: ./junit-reports
      LOAD_BALANCER: lb
      ROX_SCANNER_V4: "false"
      PYTHONUNBUFFERED: "1"
    timeout-minutes: 60
    steps:

    - name: Checkout repo
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        persist-credentials: false

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # ratchet:google-github-actions/setup-gcloud@v3
      with:
        install_components: "gke-gcloud-auth-plugin,beta"

    - name: Create GKE cluster
      env:
        MACHINE_TYPE: e2-standard-8
        NUM_NODES: "3"
        GKE_SPOT: "true"
      timeout-minutes: 20
      run: |
        source scripts/ci/gke.sh
        provision_gke_cluster dbbr
        {
          echo "CLUSTER_NAME=${CLUSTER_NAME}"
          echo "ZONE=${ZONE}"
          echo "KUBECONFIG=${HOME}/.kube/config"
        } >> "$GITHUB_ENV"

    - name: Build roxctl
      # The test uses roxctl for central backup/restore operations
      run: |
        make roxctl_linux-amd64
        echo "$(pwd)/bin/linux_amd64" >> "$GITHUB_PATH"

    - name: Verify kubectl access and wait for cluster to stabilize
      timeout-minutes: 5
      run: |
        kubectl cluster-info
        kubectl get nodes
        scripts/ci/gke.sh wait_for_cluster

    - name: Run pre-test
      shell: python
      env:
        QUAY_RHACS_ENG_BEARER_TOKEN: ${{ secrets.QUAY_RHACS_ENG_BEARER_TOKEN }}
      run: |
        import sys
        sys.path.append('.openshift-ci')
        from pre_tests import PreSystemTests
        PreSystemTests().run()

    - name: Deploy StackRox and run DB backup/restore test
      env:
        QUAY_RHACS_ENG_RO_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        QUAY_RHACS_ENG_RO_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        REGISTRY_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        ORCHESTRATOR_FLAVOR: k8s
      run: |
        source tests/e2e/lib.sh
        source tests/scripts/setup-certs.sh
        source scripts/ci/sensor-wait.sh
        export_test_environment
        setup_deployment_env false false
        deploy_stackrox
        # Persist API_ENDPOINT for post-test steps (ci_export only sets it in this shell)
        echo "API_ENDPOINT=${API_ENDPOINT}" >> "$GITHUB_ENV"
        db_backup_and_restore_test /tmp/db-backup-restore-test

    - name: Run post-test
      if: failure() || github.event_name == 'push'
      shell: python
      run: |
        import sys
        sys.path.append('.openshift-ci')
        from post_tests import CheckStackroxLogs
        CheckStackroxLogs(
            check_for_errors_in_stackrox_logs=True,
            artifact_destination_prefix="db-test",
        ).run(['/tmp/db-backup-restore-test', '${{ env.ARTIFACT_DIR }}'])

    - name: Run final-post
      if: always()
      shell: python
      run: |
        import sys
        sys.path.append('.openshift-ci')
        from post_tests import FinalPost
        FinalPost(store_qa_tests_data=False).run()

    - name: Teardown GKE cluster
      if: always()
      continue-on-error: true
      run: |
        if [[ -z "${CLUSTER_NAME:-}" ]]; then
          echo "No cluster to teardown"
          exit 0
        fi
        if ! scripts/ci/gke.sh teardown_gke_cluster false; then
          echo "::warning::WARNING: Could not tear down cluster ${CLUSTER_NAME}. See Teardown step logs for details."
          exit 6
        fi

    - name: Publish test summary
      uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # ratchet:test-summary/action@v2
      if: always()
      with:
        paths: ${{ env.ARTIFACT_DIR }}/**/*.xml
        show: all

    - name: Report junit failures in jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: ${{ env.ARTIFACT_DIR }}

      with:
        install_components: "gke-gcloud-auth-plugin"

    - name: Build roxctl and upgrader
      run: make roxctl_linux-amd64 upgrader

    - name: Verify kubectl access and wait for cluster to stabilize
      timeout-minutes: 5
      run: |
        kubectl cluster-info
        kubectl get nodes
        scripts/ci/gke.sh wait_for_cluster

    - name: Run pre-test
      shell: python
      env:
        QUAY_RHACS_ENG_BEARER_TOKEN: ${{ secrets.QUAY_RHACS_ENG_BEARER_TOKEN }}
      run: |
        import sys
        sys.path.append('.openshift-ci')
        from pre_tests import PreSystemTests
        PreSystemTests().run()

    - name: Run sensor upgrade test
      env:
        LONGTERM_LICENSE: todo - remove me
        QUAY_RHACS_ENG_RO_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        QUAY_RHACS_ENG_RO_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        REGISTRY_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        LOAD_BALANCER: lb
      run: tests/upgrade/postgres_sensor_run.sh /tmp/postgres-sensor-upgrade-test-logs

    - name: Run post-test
      if: always()
      shell: python
      run: |
        import sys
        sys.path.append('.openshift-ci')
        from post_tests import PostClusterTest
        # The particular test removes StackRox resources, therefore not collecting their artifacts.
        PostClusterTest(collect_central_artifacts=False).run(['/tmp/postgres-sensor-upgrade-test-logs', '${{ env.ARTIFACT_DIR }}'])

    - name: Run final-post
      if: always()
      shell: python
      run: |
        import sys
        sys.path.append('.openshift-ci')
        from post_tests import FinalPost
        FinalPost(store_qa_tests_data=False).run()

    - name: Teardown GKE cluster
      if: always()
      continue-on-error: true
      run: |
        if [[ -z "${CLUSTER_NAME:-}" ]]; then
          echo "No cluster to teardown"
          exit 0
        fi
        if ! scripts/ci/gke.sh teardown_gke_cluster false; then

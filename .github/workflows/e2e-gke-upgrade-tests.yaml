      CI_JOB_NAME: gke-upgrade-tests-sensor
      ARTIFACT_DIR: ./junit-reports
      # Make sure Python steps don't buffer stdout/stderr.
      PYTHONUNBUFFERED: "1"
    timeout-minutes: 60 # Keep in sync with cluster's lifespan
    steps:

    - name: Checkout repo
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

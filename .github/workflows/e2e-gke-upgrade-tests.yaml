name: e2e-gke-upgrade-tests

on:
  workflow_call:
    inputs:
      tag:
        description: Image tag to test.
        type: string
        required: true
      should-run:
        description: true if should really run the job. false - otherwise, i.e. the job should be skipped.
        type: boolean
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to test.
        type: string
        required: true

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    shell: bash

jobs:

  # Verifies Central DB upgrades/rollbacks.
  gke-upgrade-tests-central:
    if: github.event_name == 'workflow_dispatch' || inputs.should-run
    runs-on: ubuntu-latest
    env:
      MAIN_IMAGE_TAG: ${{ inputs.tag }}
      BUILD_TAG: ${{ inputs.tag }}
      USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
      # Not making CI_JOB_NAME match *gke-upgrade-tests because JUnit reporting will be broken since the former
      # gke-upgrade-tests expect all sensor, central and postgres tests to run together in a single sequence.
      CI_JOB_NAME: gke-upgrade-tests-central
      ARTIFACT_DIR: ./junit-reports
      # Make sure Python steps don't buffer stdout/stderr.
      PYTHONUNBUFFERED: "1"
    timeout-minutes: 180 # Keep in sync with cluster's lifespan
    steps:

    - name: Checkout repo
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        persist-credentials: false

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Create GKE cluster
      env:
        MACHINE_TYPE: e2-standard-8
        NUM_NODES: "3"
        GKE_SPOT: "true"
      timeout-minutes: 20
      run: |
        source scripts/ci/gke.sh
        provision_gke_cluster cent-up
        {
          echo "CLUSTER_NAME=${CLUSTER_NAME}"
          echo "ZONE=${ZONE}"
          echo "KUBECONFIG=${HOME}/.kube/config"
        } >> "$GITHUB_ENV"

    - name: Docker login to Quay.io
      env:
        REGISTRY_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
      run: docker login -u "${REGISTRY_USERNAME}" --password-stdin quay.io <<<"${REGISTRY_PASSWORD}"

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # ratchet:google-github-actions/setup-gcloud@v3
      with:
        install_components: "gke-gcloud-auth-plugin"

    - name: Build roxctl
      run: make roxctl_linux-amd64

    - name: Verify kubectl access and wait for cluster to stabilize
      timeout-minutes: 5
      run: |
        kubectl cluster-info
        kubectl get nodes
        scripts/ci/gke.sh wait_for_cluster

    - name: Run pre-test
      shell: python
      env:
        QUAY_RHACS_ENG_BEARER_TOKEN: ${{ secrets.QUAY_RHACS_ENG_BEARER_TOKEN }}
      run: |
        import sys
        sys.path.append('.openshift-ci')
        from pre_tests import PreSystemTests
        PreSystemTests().run()

    - name: Fix GOPATH and PATH for building and running roxctl during tests
      run: |
        GOPATH="$(go env GOPATH)"
        echo "GOPATH=${GOPATH}" | tee -a "${GITHUB_ENV}"
        echo "${GOPATH}/bin" | tee -a "${GITHUB_PATH}"

    - name: Run central upgrade test
      env:
        LONGTERM_LICENSE: todo - remove me
        QUAY_RHACS_ENG_RO_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        QUAY_RHACS_ENG_RO_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        REGISTRY_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        GOOGLE_CREDENTIALS_GCR_SCANNER_V2: ${{ secrets.GOOGLE_CREDENTIALS_GCR_SCANNER_V2 }}
        GOOGLE_ARTIFACT_REGISTRY_SERVICE_ACCOUNT_V2: ${{ secrets.GOOGLE_ARTIFACT_REGISTRY_SERVICE_ACCOUNT_V2 }}
        REDHAT_USERNAME: ${{ secrets.RH_REGISTRY_USERNAME_RO }}
        REDHAT_PASSWORD: ${{ secrets.RH_REGISTRY_PASSWORD_RO }}
        LOAD_BALANCER: lb
      run: |
        tests/upgrade/postgres_run.sh /tmp/postgres-upgrade-test-logs
        # This makes sure Stackrox_Deployment / Was Stackrox deployed to the cluster? test does not fail.
        touch /tmp/stackrox_ci_state_deployed

    - name: Run post-test
      if: always()
      shell: python
      run: |
        import sys
        sys.path.append('.openshift-ci')
        from post_tests import PostClusterTest
        PostClusterTest(collect_central_artifacts=True).run(['/tmp/postgres-upgrade-test-logs', '${{ env.ARTIFACT_DIR }}'])

    - name: Run final-post
      if: always()
      shell: python
      env:
        QA_TEST_DEBUG_LOGS: /tmp/qa-tests-backend-logs
      run: |
        import sys
        sys.path.append('.openshift-ci')
        from post_tests import FinalPost
        FinalPost(store_qa_tests_data=True).run()

    - name: Teardown GKE cluster
      if: always()
      continue-on-error: true
      run: |
        if [[ -z "${CLUSTER_NAME:-}" ]]; then
          echo "No cluster to teardown"
          exit 0
        fi
        if ! scripts/ci/gke.sh teardown_gke_cluster false; then
          echo "::warning::WARNING: Could not tear down cluster ${CLUSTER_NAME}. See Teardown step logs for details."
          exit 6
        fi

    - name: Publish test summary
      uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # ratchet:test-summary/action@v2
      if: always()
      with:
        paths: ${{ env.ARTIFACT_DIR }}/**/*.xml
        show: all

    - name: Report junit failures in jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: ${{ env.ARTIFACT_DIR }}

  # Verifies we can do Postgres major version upgrade.
  gke-upgrade-tests-postgres:
    if: github.event_name == 'workflow_dispatch' || inputs.should-run
    runs-on: ubuntu-latest
    env:
      MAIN_IMAGE_TAG: ${{ inputs.tag }}
      BUILD_TAG: ${{ inputs.tag }}
      USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
      # Not making CI_JOB_NAME match *gke-upgrade-tests because JUnit reporting will be broken since the former

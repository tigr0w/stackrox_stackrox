name: e2e-nongroovy-tests

on:
  workflow_call:
    inputs:
      tag:
        description: Image tag to test.
        type: string
        required: true
      should-run:
        description: true if should really run the job. false - otherwise, i.e. the job should be skipped.
        type: boolean
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to test.
        type: string
        required: true

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    shell: bash

jobs:
  gke-nongroovy-e2e-tests:
    if: github.event_name == 'workflow_dispatch' || inputs.should-run
    runs-on: ubuntu-latest
    env:
      MAIN_IMAGE_TAG: ${{ inputs.tag }}
      BUILD_TAG: ${{ inputs.tag }}
      USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
      GCP_SERVICE_ACCOUNT_STACKROX_CI: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
      CI_JOB_NAME: gke-nongroovy-e2e-tests
      ARTIFACT_DIR: ./junit-reports
      LOAD_BALANCER: lb
      ORCHESTRATOR_FLAVOR: k8s
      KUBERNETES_PROVIDER: gke
      SENSOR_SCANNER_SUPPORT: "true"
      ROX_DEPLOY_SENSOR_WITH_CRS: "true"
      SENSOR_HELM_MANAGED: "true"
      SCANNER_V4_DB_STORAGE_CLASS: faster
      ROX_SCANNER_V4: "false"
      PYTHONUNBUFFERED: "1"
    timeout-minutes: 120
    steps:

    - name: Checkout repo
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        persist-credentials: false

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Docker login to Quay.io
      env:
        REGISTRY_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
      run: docker login -u "${REGISTRY_USERNAME}" --password-stdin quay.io <<<"${REGISTRY_PASSWORD}"

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # ratchet:google-github-actions/setup-gcloud@v3
      with:
        install_components: "gke-gcloud-auth-plugin,beta"

    - name: Create GKE cluster
      env:
        MACHINE_TYPE: e2-standard-8
        NUM_NODES: "3"
        GKE_SPOT: "true"
      timeout-minutes: 20
      run: |
        source scripts/ci/gke.sh
        provision_gke_cluster nongroovy
        {
          echo "CLUSTER_NAME=${CLUSTER_NAME}"
          echo "ZONE=${ZONE}"
          echo "KUBECONFIG=${HOME}/.kube/config"
        } >> "$GITHUB_ENV"

    - name: Build roxctl
      # roxctl is used for various CLI e2e tests (token-file, authz-trace, istio-support, etc.)
      # Copy to /usr/local/bin so it survives bats tests which mv the binary out of bin/
      run: |
        make roxctl_linux-amd64
        sudo cp bin/linux_amd64/roxctl /usr/local/bin/roxctl
        echo "${HOME}/go/bin" >> "$GITHUB_PATH"

    - name: Verify kubectl access and wait for cluster to stabilize
      timeout-minutes: 5
      run: |
        kubectl cluster-info
        kubectl get nodes
        scripts/ci/gke.sh wait_for_cluster

    - name: Create artifact directory
      run: mkdir -p "$ARTIFACT_DIR"

    - name: Run pre-test
      shell: python
      env:
        QUAY_RHACS_ENG_BEARER_TOKEN: ${{ secrets.QUAY_RHACS_ENG_BEARER_TOKEN }}
        QUAY_RHACS_ENG_RO_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        QUAY_RHACS_ENG_RO_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
      run: |
        import sys
        sys.path.append('.openshift-ci')
        from pre_tests import PreSystemTests
        PreSystemTests().run()

    - name: Install bats
      run: |
        sudo npm install -g bats bats-support bats-assert
        sudo mkdir -p /usr/lib/node_modules
        sudo ln -s /usr/local/lib/node_modules/bats-support /usr/lib/node_modules/bats-support
        sudo ln -s /usr/local/lib/node_modules/bats-assert /usr/lib/node_modules/bats-assert

    - name: Run e2e tests
      # SETUP_WORKLOAD_IDENTITIES is intentionally omitted; WIF tests run in the Prow pipeline.
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_S3_BACKUP_TEST_BUCKET_NAME: ${{ secrets.AWS_S3_BACKUP_TEST_BUCKET_NAME }}
        AWS_S3_BACKUP_TEST_BUCKET_REGION: ${{ secrets.AWS_S3_BACKUP_TEST_BUCKET_REGION }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        BUILD_ID: ${{ github.run_id }}
        CLOUDFLARE_R2_BACKUP_TEST_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_BACKUP_TEST_ACCESS_KEY_ID }}
        CLOUDFLARE_R2_BACKUP_TEST_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_BACKUP_TEST_ACCOUNT_ID }}
        CLOUDFLARE_R2_BACKUP_TEST_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BACKUP_TEST_BUCKET_NAME }}
        CLOUDFLARE_R2_BACKUP_TEST_REGION: ${{ secrets.CLOUDFLARE_R2_BACKUP_TEST_REGION }}
        CLOUDFLARE_R2_BACKUP_TEST_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_BACKUP_TEST_SECRET_ACCESS_KEY }}
        GCP_GCS_BACKUP_TEST_BUCKET_NAME_V2: ${{ secrets.GCP_GCS_BACKUP_TEST_BUCKET_NAME_V2 }}
        GOOGLE_GCS_BACKUP_SERVICE_ACCOUNT_V2: ${{ secrets.GOOGLE_GCS_BACKUP_SERVICE_ACCOUNT_V2 }}
        ODF_S3_BACKUP_TEST_ACCESS_KEY_ID: ${{ secrets.ODF_S3_BACKUP_TEST_ACCESS_KEY_ID }}
        ODF_S3_BACKUP_TEST_BUCKET_NAME: ${{ secrets.ODF_S3_BACKUP_TEST_BUCKET_NAME }}
        ODF_S3_BACKUP_TEST_ENDPOINT: ${{ secrets.ODF_S3_BACKUP_TEST_ENDPOINT }}
        ODF_S3_BACKUP_TEST_REGION: ${{ secrets.ODF_S3_BACKUP_TEST_REGION }}
        ODF_S3_BACKUP_TEST_SECRET_ACCESS_KEY: ${{ secrets.ODF_S3_BACKUP_TEST_SECRET_ACCESS_KEY }}
        QUAY_RHACS_ENG_RO_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        QUAY_RHACS_ENG_RO_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        REGISTRY_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
      timeout-minutes: 90
      run: tests/e2e/run.sh /tmp/e2e-test-logs

    - name: Persist env vars for post-test
      if: failure() || github.event_name == 'push'
      run: |
        source tests/e2e/lib.sh
        wait_for_api
        echo "API_ENDPOINT=${API_ENDPOINT}" >> "$GITHUB_ENV"
        echo "ROX_ADMIN_PASSWORD=$(cat deploy/k8s/central-deploy/password)" >> "$GITHUB_ENV"

    - name: Run post-test
      if: failure() || github.event_name == 'push'
      shell: python
      env:
        ROX_USERNAME: admin
      run: |
        import os, sys
        sys.path.append('.openshift-ci')
        from post_tests import PostClusterTest
        post = PostClusterTest(
            check_stackrox_logs=False,
        )
        if os.environ.get("ORCHESTRATOR_FLAVOR") == "k8s":
            post.openshift_namespaces = []
        post.run(['/tmp/e2e-test-logs', '${{ env.ARTIFACT_DIR }}'])

    - name: Run final-post
      if: always()
      shell: python
      run: |
        import sys
        sys.path.append('.openshift-ci')
        from post_tests import FinalPost
        FinalPost(store_qa_tests_data=False).run()

    - name: Teardown GKE cluster
      if: always()
      continue-on-error: true
      run: |
        if [[ -z "${CLUSTER_NAME:-}" ]]; then
          echo "No cluster to teardown"
          exit 0
        fi
        if ! scripts/ci/gke.sh teardown_gke_cluster false; then
          echo "::warning::WARNING: Could not tear down cluster ${CLUSTER_NAME}. See Teardown step logs for details."
          exit 6
        fi

    - name: Publish test summary
      uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # ratchet:test-summary/action@v2
      if: always()
      with:
        paths: ${{ env.ARTIFACT_DIR }}/**/*.xml
        show: all

    - name: Report junit failures in jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: ${{ env.ARTIFACT_DIR }}

{{- include "srox.init" . -}}

{{- if ._rox.monitoring.openshift.enabled -}}
{{- /*
Separate Service so OpenShift can issue a distinct service-serving certificate
(SNI: central-ocp.<ns>.svc). The main "central" Service keeps the StackRox
service cert for central.<ns>.svc used by Sensors and other clients; both certs
are presented from the same :8443 listener based on SNI.
*/}}

apiVersion: v1
kind: Service
metadata:
  name: central-ocp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srox.labels" (list . "service" "central-ocp") | nindent 4 }}
    stackrox.io/ocp-api: "true"
  annotations:
    {{- include "srox.annotations" (list . "service" "central-ocp") | nindent 4 }}
    service.beta.openshift.io/serving-cert-secret-name: central-ocp-tls
spec:
  ports:
  - name: https
    port: 443
    targetPort: api
  selector:
    app: central
  type: ClusterIP

{{- end -}}
